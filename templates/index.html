<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Search Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        /* Upload Section */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area input { display: none; }
        .upload-area p { color: var(--text-muted); font-size: 0.9rem; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            width: 100%;
            margin-top: 1rem;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status Section */
        #status-box {
            min-height: 80px;
            background: #0f172a;
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Captcha Section */
        .captcha-card {
            grid-column: 1 / -1;
            text-align: center;
            display: none;
        }
        .captcha-card.active { display: block; }
        .captcha-card img {
            border: 2px solid var(--accent);
            border-radius: 8px;
            margin: 1rem 0;
            max-width: 300px;
            image-rendering: pixelated;
        }
        .captcha-input {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }
        .captcha-input input {
            background: #0f172a;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            width: 180px;
            text-align: center;
            font-family: monospace;
        }
        .captcha-input input:focus { outline: none; border-color: var(--accent); }
        .captcha-input button { width: auto; margin-top: 0; }

        .pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #download-btn {
            background: var(--success);
            display: none;
        }
        #download-btn:hover { background: #16a34a; }

        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🔍 GST Search Automation</h1>
    <p class="subtitle">Upload Excel → Solve Captchas → Download Results</p>

    <div class="container">
        <!-- Upload Card -->
        <div class="card">
            <h2>📁 Upload Excel</h2>
            <div class="upload-area" id="drop-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".xlsx,.xls">
                <p id="file-label">Click or drag your Excel file here</p>
            </div>
            <button id="startBtn" onclick="startProcessing()" disabled>🚀 Start Processing</button>
            <button id="download-btn" onclick="downloadResult()">⬇️ Download Results</button>
        </div>

        <!-- Status Card -->
        <div class="card">
            <h2>📊 Status</h2>
            <div id="status-box">Waiting for upload...</div>
        </div>

        <!-- Captcha Card (hidden until needed) -->
        <div class="card captcha-card" id="captcha-card">
            <h2>🔐 Solve Captcha</h2>
            <p style="color: var(--text-muted); margin-bottom: 0.5rem;">Type the characters shown below:</p>
            <img id="captcha-img" src="" alt="Captcha">
            <div class="captcha-input">
                <input type="text" id="captcha-input" maxlength="6" placeholder="123456"
                       onkeydown="if(event.key==='Enter') submitCaptcha()">
                <button onclick="submitCaptcha()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        let jobId = null;
        let polling = null;
        let captchaPolling = null;

        // File selection
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                document.getElementById('file-label').textContent = e.target.files[0].name;
                document.getElementById('startBtn').disabled = false;
            }
        });

        function updateStatus(msg) {
            const box = document.getElementById('status-box');
            box.textContent = msg;
            box.scrollTop = box.scrollHeight;
        }

        function startProcessing() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('startBtn').disabled = true;
            updateStatus('Uploading...');

            fetch('/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    jobId = data.job_id;
                    updateStatus('Processing started. Watch for captchas below!');
                    startPolling();
                    startCaptchaPolling();
                })
                .catch(err => updateStatus('Upload error: ' + err));
        }

        function startPolling() {
            polling = setInterval(() => {
                fetch('/status/' + jobId)
                    .then(r => r.json())
                    .then(data => {
                        updateStatus(data.message || data.status);
                        if (data.status === 'completed') {
                            clearInterval(polling);
                            stopCaptchaPolling();
                            document.getElementById('download-btn').style.display = 'block';
                            document.getElementById('captcha-card').classList.remove('active');
                        } else if (data.status === 'failed') {
                            clearInterval(polling);
                            stopCaptchaPolling();
                            updateStatus('❌ Failed: ' + (data.error || 'Unknown error'));
                        }
                    });
            }, 1500);
        }

        function startCaptchaPolling() {
            captchaPolling = setInterval(() => {
                fetch('/captcha')
                    .then(r => r.json())
                    .then(data => {
                        const card = document.getElementById('captcha-card');
                        if (data.waiting && data.image_b64) {
                            card.classList.add('active');
                            document.getElementById('captcha-img').src = 'data:image/png;base64,' + data.image_b64;
                            document.getElementById('captcha-input').value = '';
                            document.getElementById('captcha-input').focus();
                        } else {
                            card.classList.remove('active');
                        }
                    });
            }, 1000);
        }

        function stopCaptchaPolling() {
            if (captchaPolling) clearInterval(captchaPolling);
        }

        function submitCaptcha() {
            const val = document.getElementById('captcha-input').value.trim();
            if (val.length === 0) return;
            fetch('/captcha/solve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ solution: val })
            }).then(() => {
                document.getElementById('captcha-card').classList.remove('active');
                updateStatus('Captcha submitted! Waiting for result...');
            });
        }

        function downloadResult() {
            window.location.href = '/download/' + jobId;
        }
    </script>
</body>
</html>
